<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetDiag Toolbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
    }
    /* Custom scrollbar for the dark output box */
    pre::-webkit-scrollbar {
      width: 8px;
    }
    pre::-webkit-scrollbar-track {
      background: #1f2937;
    }
    pre::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 4px;
    }
    pre::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
    /* Hide number input arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .form-container {
      min-height: 400px;
    }
    @media (min-width: 800px) {
      .form-container {
        max-height: none;
      }
    }
    .output-container {
      min-height: 600px;
    }

  </style>
</head>
<body class="h-full font-sans text-gray-900">
  <!-- Main container -->
  <div class="flex flex-col h-full">
    <!-- Header with user info -->
    </header>

    <!-- Reset Password Modal -->
    <div id="reset-password-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-lg p-6 w-full max-w-md">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold text-gray-900">Reset Password</h2>
          <button id="close-reset-modal" class="text-gray-400 hover:text-gray-600">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <form id="reset-password-form" class="space-y-4">
          <div>
            <label for="new-password" class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
            <input type="password" id="new-password" required class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
          </div>
          <div>
            <label for="confirm-password" class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
            <input type="password" id="confirm-password" required class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
          </div>
          <div id="password-error" class="hidden text-red-600 text-sm"></div>
          <div class="flex gap-2 pt-2">
            <button type="button" id="cancel-reset" class="flex-1 px-4 py-2 text-gray-700 bg-gray-200 hover:bg-gray-300 rounded font-semibold transition">
              Cancel
            </button>
            <button type="submit" class="flex-1 px-4 py-2 text-white bg-[#9D003A] hover:bg-[#72002E] rounded font-semibold transition">
              Reset Password
            </button>
          </div>
        </form>
      </div>
    </div>

    <header class="bg-white shadow border-b border-gray-200">
      <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-[#9D003A]">NetDiag Toolbox</h1>
        <div class="flex items-center gap-4 relative">
          <!-- User menu button -->
          <button id="user-menu-btn" class="flex items-center gap-1 px-4 py-2 bg-gray-200 hover:bg-[#9D003A] hover:text-white text-gray-900 rounded font-semibold transition">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
              <path d="M10 2a4 4 0 100 8 4 4 0 000-8zM2 18a8 8 0 1116 0H2z"/>
            </svg>
            <span id="current-user" class="hidden md:inline text-sm text-gray-600 hover:text-white">Loading...</span>
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>
          <div id="user-menu" class="hidden absolute right-0 top-full mt-2 w-40 bg-white shadow-lg rounded z-50">
            <a href="/admin" id="admin-link" class="hidden flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-[#9D003A] hover:text-white">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
              </svg>
              Settings
            </a>
            <button id="reset-password-btn" class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-[#9D003A] hover:text-white">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
              </svg>
              Reset Password
            </button>
            <button id="menu-logout" class="w-full text-left flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-[#9D003A] hover:text-white">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
              </svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main content area -->
    <div class="flex-grow overflow-y-auto">
      <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-col md:flex-row h-full gap-6 overflow-hidden">
          
          <!-- Consolidated Header + Form Section - Left side on large screens, max 400px width -->
          <div class="w-full md:max-w-[400px] form-container overflow-y-auto md:overflow-y-visible">
            <div class="bg-white shadow rounded-lg p-4 h-full flex flex-col">
          
          <!-- Controls -->
          <div class="flex flex-col space-y-4 overflow-y-auto">
            <!-- Tool Selector -->
            <div>
              <label for="tool-select" class="block text-sm font-semibold text-gray-700 mb-1">Select Tool</label>
              <select id="tool-select" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
                <option value="ping">Ping</option>
                <option value="nslookup">NSLookup</option>
                <option value="nslookup_bulk">NSLookup (Bulk)</option>
                <option value="traceroute">Traceroute</option>
                <option value="mtr">TCP Traceroute</option>
                <option value="openssl_sconnect">TLS Handshake</option>
                <option value="curl">HTTP Timing Stats</option>
              </select>
            </div>
            
            <!-- Host Input -->
            <div id="host-container" class="hidden">
              <label for="host-input" class="block text-sm font-semibold text-gray-700 mb-1">Host / IP</label>
              <input type="text" id="host-input" placeholder="e.g., google.com" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
            </div>
            <!-- Ping Options (packet size / don't fragment) -->
            <div id="ping-options" class="hidden space-y-4">
              <div>
                <label for="packet-size-input" class="block text-sm font-semibold text-gray-700 mb-1">Packet Size (bytes)</label>
                <input type="number" id="packet-size-input" placeholder="eg. 1420" min="0" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
              </div>
              <div class="flex items-center">
                <input id="dont-frag-checkbox" type="checkbox" class="h-3 w-3 text-[#9D003A] border-gray-300 rounded focus:ring-[#9D003A]">
                <label for="dont-frag-checkbox" class="ml-2 text-sm text-gray-900">Don't fragment</label>
              </div>
            </div>

            <!-- Bulk Hosts Input -->
            <div id="bulk-hosts-container" class="hidden">
              <label for="bulk-hosts-input" class="block text-sm font-semibold text-gray-700 mb-1">Hosts (one per line)</label>
              <textarea id="bulk-hosts-input" placeholder="google.com&#10;8.8.8.8" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none resize-none" rows="2"></textarea>
            </div>

            <!-- NSLookup Options -->
            <div id="dns-options" class="hidden space-y-4">
              <div>
                <label for="dns-server-input" class="block text-sm font-semibold text-gray-700 mb-1">DNS Server (Opt)</label>
                <input type="text" id="dns-server-input" placeholder="1.1.1.1" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
              </div>
              <div>
                <label for="record-type-select" class="block text-sm font-semibold text-gray-700 mb-1">Record Type</label>
                <select id="record-type-select" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
                  <option value="A">A</option>
                  <option value="AAAA">AAAA</option>
                  <option value="CNAME">CNAME</option>
                  <option value="MX">MX</option>
                  <option value="TXT">TXT</option>
                  <option value="NS">NS</option>
                  <option value="SOA">SOA</option>
                  <option value="PTR">PTR</option>
                  <option value="SRV">SRV</option>
                  <option value="ANY">ANY</option>
                </select>
              </div>
              <div class="flex items-center">
                <input id="nslookup-debug-checkbox" type="checkbox" class="h-3 w-3 text-[#9D003A] border-gray-300 rounded focus:ring-[#9D003A]">
                <label for="nslookup-debug-checkbox" class="ml-2 text-sm text-gray-900">Debug output</label>
              </div>
            </div>
            
            <!-- MTR Options -->
            <div id="mtr-options" class="hidden">
              <label for="mtr-port-input" class="block text-sm font-semibold text-gray-700 mb-1">TCP Port</label>
              <input type="number" id="mtr-port-input" placeholder="443" min="1" max="65535" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
            </div>
            
            <!-- OpenSSL Options -->
            <div id="port-option" class="hidden">
              <label for="port-input" class="block text-sm font-semibold text-gray-700 mb-1">Port (Opt)</label>
              <input type="number" id="port-input" placeholder="443" min="1" max="65535" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded p-2 placeholder-gray-400 focus:ring-2 focus:ring-[#9D003A] focus:border-[#9D003A] focus:outline-none">
            </div>
            <div id="openssl-option" class="hidden flex items-center">
              <input id="openssl-debug-checkbox" type="checkbox" class="h-3 w-3 text-[#9D003A] border-gray-300 rounded focus:ring-[#9D003A]">
              <label for="openssl-debug-checkbox" class="ml-2 text-sm text-gray-900">Output certs</label>
            </div>
            
            <!-- Curl Options (Protocol) -->
            <div id="curl-options" class="hidden space-y-4">
              <div class="flex items-center">
                <input id="curl-https-checkbox" type="checkbox" checked class="h-3 w-3 text-[#9D003A] border-gray-300 rounded focus:ring-[#9D003A]">
                <label for="curl-https-checkbox" class="ml-2 text-sm text-gray-900">Use HTTPS</label>
              </div>
            </div>
            </div>

            <!-- Run Button - sticky at bottom -->
            <button id="run-button" class="w-full mt-4 bg-[#9D003A] hover:bg-[#72002E] text-white font-bold py-2 px-4 rounded transition duration-200 focus:outline-none focus:ring-2 focus:ring-[#9D003A] focus:ring-offset-2 focus:ring-offset-white disabled:opacity-50 disabled:cursor-not-allowed">
              Run
            </button>
            </div>
          </div>
          
          <!-- Output Section - Right side on large screens, expands to fill width -->
          <div class="w-full md:flex-grow output-container">
            <div class="bg-gray-900 rounded-lg border border-gray-700 overflow-hidden shadow-lg h-full flex flex-col relative">
              <div class="px-3 py-2 bg-gray-800 border-b border-gray-700 flex items-center justify-between">
                <h2 class="text-sm font-semibold text-white">Output</h2>
                <button id="copy-button" class="text-gray-400 hover:text-white transition-colors focus:outline-none" title="Copy output to clipboard">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                  </svg>
                </button>
              </div>
              <pre id="output" class="flex-grow p-3 font-mono text-xs text-gray-300 overflow-auto whitespace-pre-wrap break-words">Waiting for command...</pre>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Authentication and tool-specific code
    let requirePasswordChange = false; // set when API tells us force reset is required

    document.addEventListener('DOMContentLoaded', async () => {
      // Check authentication and load user info
      await loadUserInfo();
      
      // Initialize tool UI
      initializeToolUI();
    });

    async function loadUserInfo() {
      try {
        const response = await fetch('/api/auth/me');
        if (!response.ok) {
          window.location.href = '/';
          return;
        }

        const data = await response.json();
        const username = data.user.username;
        const permissions = data.permissions;
        const forceChange = data.user.forcePasswordChange;

        // Update UI with current user
        document.getElementById('current-user').textContent = username;

        // Show admin link if user has administration permission
        if (permissions.includes('administration')) {
          document.getElementById('admin-link').classList.remove('hidden');
        }

        // Filter tools based on permissions
        filterToolsByPermissions(permissions);

        // record flag so initializeToolUI can handle the forced modal
        if (forceChange) {
          requirePasswordChange = true;
        }
      } catch (err) {
        window.location.href = '/';
      }
    }

    function filterToolsByPermissions(permissions) {
      const toolSelect = document.getElementById('tool-select');
      const hasAdmin = permissions.includes('administration');

      // Map of permission names to tool values
      const permissionMap = {
        'tool_ping': 'ping',
        'tool_nslookup': 'nslookup',
        'tool_nslookup_bulk': 'nslookup_bulk',
        'tool_traceroute': 'traceroute',
        'tool_mtr': 'mtr',
        'tool_openssl': 'openssl_sconnect',
        'tool_curl': 'curl'
      };

      // If not admin, remove tools they don't have access to
      if (!hasAdmin) {
        const allowedTools = permissions
          .filter(p => p.startsWith('tool_'))
          .map(p => permissionMap[p]);

        Array.from(toolSelect.options).forEach(option => {
          if (!allowedTools.includes(option.value)) {
            option.remove();
          }
        });
      }

      // Set to first available option
      if (toolSelect.options.length > 0) {
        toolSelect.value = toolSelect.options[0].value;
      }
    }

    function initializeToolUI() {
      // Get all elements
      const toolSelect = document.getElementById('tool-select');
      const hostInput = document.getElementById('host-input');
      const runButton = document.getElementById('run-button');
      const copyButton = document.getElementById('copy-button');
      const logoutBtn = document.getElementById('menu-logout');
      const output = document.getElementById('output');
      
      // Option containers
      const dnsOptions = document.getElementById('dns-options');
      const mtrOptions = document.getElementById('mtr-options');
      const portOption = document.getElementById('port-option');
      const HostContainer = document.getElementById('host-container');
      const bulkHostsContainer = document.getElementById('bulk-hosts-container');
      const pingOptions = document.getElementById('ping-options');
      
      // Specific inputs
      const dnsServerInput = document.getElementById('dns-server-input');
      const recordTypeSelect = document.getElementById('record-type-select');
      const nslookupDebugCheckbox = document.getElementById('nslookup-debug-checkbox');
      const mtrPortInput = document.getElementById('mtr-port-input');
      const portInput = document.getElementById('port-input');
      const opensslDebugCheckbox = document.getElementById('openssl-debug-checkbox');
      const opensslOption = document.getElementById('openssl-option');
      const bulkHostsInput = document.getElementById('bulk-hosts-input');
      const packetSizeInput = document.getElementById('packet-size-input');
      const dontFragCheckbox = document.getElementById('dont-frag-checkbox');
      const curlOptions = document.getElementById('curl-options');
      const curlHttpsCheckbox = document.getElementById('curl-https-checkbox');

      // Function to update UI based on tool selection
      function updateToolOptions() {
        const selectedTool = toolSelect.value;
        
        // Hide all optional containers
        dnsOptions.classList.add('hidden');
        mtrOptions.classList.add('hidden');
        portOption.classList.add('hidden');
        opensslOption.classList.add('hidden');
        bulkHostsContainer.classList.add('hidden');
        HostContainer.classList.add('hidden');
        pingOptions.classList.add('hidden');
        curlOptions.classList.add('hidden');

        // Show relevant containers
        if (selectedTool === 'nslookup') {
          HostContainer.classList.remove('hidden');
          dnsOptions.classList.remove('hidden');
        } else if (selectedTool === 'nslookup_bulk') {
          dnsOptions.classList.remove('hidden');
          bulkHostsContainer.classList.remove('hidden');
          HostContainer.classList.add('hidden');
        } else if (selectedTool === 'mtr') {
          HostContainer.classList.remove('hidden');
          mtrOptions.classList.remove('hidden');
        } else if (selectedTool === 'openssl_sconnect') {
          HostContainer.classList.remove('hidden');
          portOption.classList.remove('hidden');
          opensslOption.classList.remove('hidden');
        } else if (selectedTool === 'ping') {
          HostContainer.classList.remove('hidden');
          pingOptions.classList.remove('hidden');
        } else if (selectedTool === 'curl') {
          HostContainer.classList.remove('hidden');
          portOption.classList.remove('hidden');
          curlOptions.classList.remove('hidden');
        } else {
          HostContainer.classList.remove('hidden');
        }
      }

      // Show/hide options on tool change
      toolSelect.addEventListener('change', updateToolOptions);
      
      // Manually trigger on load to set initial state
      updateToolOptions();

      // User menu toggle
      const userMenuBtn = document.getElementById('user-menu-btn');
      const userMenu = document.getElementById('user-menu');
      userMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userMenu.classList.toggle('hidden');
      });
      // hide menu when clicking outside
      document.addEventListener('click', (e) => {
        if (!userMenuBtn.contains(e.target) && !userMenu.contains(e.target)) {
          userMenu.classList.add('hidden');
        }
      });

      // logout from menu
      document.getElementById('menu-logout').addEventListener('click', async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        } catch (err) {
          console.error('Logout error:', err);
        }
      });

      // Copy button functionality
      copyButton.addEventListener('click', async () => {
        try {
          const text = output.textContent;
          await navigator.clipboard.writeText(text);
          
          // Visual feedback
          const originalColor = copyButton.classList.contains('text-white') ? 'text-white' : 'text-gray-400';
          copyButton.classList.remove(originalColor);
          copyButton.classList.add('text-green-400');
          copyButton.setAttribute('title', 'Copied!');
          
          // Reset after 2 seconds
          setTimeout(() => {
            copyButton.classList.remove('text-green-400');
            copyButton.classList.add('text-gray-400');
            copyButton.setAttribute('title', 'Copy output to clipboard');
          }, 500);
        } catch (err) {
          console.error('Failed to copy:', err);
          copyButton.classList.add('text-red-400');
          copyButton.setAttribute('title', 'Copy failed');
          
          setTimeout(() => {
            copyButton.classList.remove('text-red-400');
            copyButton.classList.add('text-gray-400');
            copyButton.setAttribute('title', 'Copy output to clipboard');
          }, 2000);
        }
      });

      // Logout functionality
      logoutBtn.addEventListener('click', async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
        } catch (err) {
          console.error('Logout error:', err);
        }
      });

      // Reset Password Modal functionality
      const resetPasswordBtn = document.getElementById('reset-password-btn');
      const resetPasswordModal = document.getElementById('reset-password-modal');
      const closeResetModalBtn = document.getElementById('close-reset-modal');
      const cancelResetBtn = document.getElementById('cancel-reset');
      const resetPasswordForm = document.getElementById('reset-password-form');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const passwordError = document.getElementById('password-error');

      // Open modal
      resetPasswordBtn.addEventListener('click', () => {
        resetPasswordModal.classList.remove('hidden');
        newPasswordInput.focus();
      });

      // Close modal
      function closeResetPasswordModal() {
        if (requirePasswordChange) {
          // do not allow closing when user is forced to reset
          return;
        }
        resetPasswordModal.classList.add('hidden');
        resetPasswordForm.reset();
        passwordError.classList.add('hidden');
      }

      closeResetModalBtn.addEventListener('click', closeResetPasswordModal);
      cancelResetBtn.addEventListener('click', closeResetPasswordModal);

      // Close modal when clicking outside
      resetPasswordModal.addEventListener('click', (e) => {
        if (e.target === resetPasswordModal) {
          closeResetPasswordModal();
        }
      });

      // if forced password change was flagged during loadUserInfo, lock modal open
      if (requirePasswordChange) {
        resetPasswordModal.classList.remove('hidden');
        closeResetModalBtn.style.display = 'none';
        cancelResetBtn.style.display = 'none';
      }

      // Handle form submission
      resetPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = newPasswordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        // Validate passwords match
        if (newPassword !== confirmPassword) {
          passwordError.textContent = 'Passwords do not match';
          passwordError.classList.remove('hidden');
          return;
        }

        // Validate password length
        if (newPassword.length < 6) {
          passwordError.textContent = 'Password must be at least 6 characters';
          passwordError.classList.remove('hidden');
          return;
        }

        try {
          const response = await fetch('/api/auth/change-password', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ newPassword })
          });

          if (!response.ok) {
            const data = await response.json();
            passwordError.textContent = data.error || 'Failed to change password';
            passwordError.classList.remove('hidden');
            return;
          }

          // Close modal and logout
          closeResetPasswordModal();
          
          // Show success message and logout
          alert('Password changed successfully. You will be logged out.');
          await fetch('/api/auth/logout', { method: 'POST' });
          window.location.href = '/';
          
        } catch (err) {
          console.error('Change password error:', err);
          passwordError.textContent = 'An error occurred. Please try again.';
          passwordError.classList.remove('hidden');
        }
      });

      // Allow pressing Enter in the input field to run the command
      hostInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') e.preventDefault();
      });

      runButton.addEventListener('click', async () => {
        const tool = toolSelect.value;
        const host = hostInput.value;
        const bulkHosts = bulkHostsInput.value;

        // Validate input based on tool type
        if (tool === 'nslookup_bulk') {
          if (!bulkHosts.trim()) {
            output.textContent = 'Error: Please enter one or more hostnames or IP addresses.';
            return;
          }
        } else {
          if (!host) {
            output.textContent = 'Error: Please enter a hostname or IP address.';
            return;
          }
        }
        
        // Disable button and show loading state
        runButton.disabled = true;
        runButton.textContent = 'Running...';
        
        if (tool === 'nslookup_bulk') {
          output.textContent = `Running bulk ${tool.replace('_', ' ')}...\n\n`;
        } else {
          output.textContent = `Running ${tool} on ${host}...\n\n`;
        }

        // Collect all optional parameters
        let port = null;
        let protocol = null;
        let debug = false;
        let dnsServer = null;
        let recordType = null;
        let packetSize = null;
        let dontFrag = false;
        let useHttps = false;
        
        if (tool === 'nslookup' || tool === 'nslookup_bulk') {
          dnsServer = dnsServerInput.value;
          debug = nslookupDebugCheckbox.checked;
          recordType = recordTypeSelect.value;
          if (tool === 'nslookup') {
            output.textContent = `Running ${tool} on ${host} (type ${recordType})` +
                                 (dnsServer ? ` using server ${dnsServer}` : '') +
                                 `...\n\n`;
          } else {
            output.textContent = `Running bulk nslookup (type ${recordType})...\n\n`;
          }
        } else if (tool === 'mtr') {
          port = mtrPortInput.value || '443';
        } else if (tool === 'openssl_sconnect') {
          port = portInput.value || '443';
          debug = opensslDebugCheckbox.checked;
        } else if (tool === 'ping') {
          packetSize = packetSizeInput.value;
          dontFrag = dontFragCheckbox.checked;
        } else if (tool === 'curl') {
          protocol = curlHttpsCheckbox.checked ? 'https' : 'http';
          port = portInput.value;
          const scheme = protocol === 'https' ? 'https://' : 'http://';
          const portSuffix = port ? `:${port}` : '';
          output.textContent = `Running HTTP timing stats on ${scheme}${host}${portSuffix}...\n\n`;
        }

        try {
          const response = await fetch('/api/net-tool', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
              tool, 
              host: tool === 'nslookup_bulk' ? undefined : host,
              hosts: tool === 'nslookup_bulk' ? bulkHosts : undefined,
              dnsServer: dnsServer || undefined,
              recordType: recordType || undefined,
              packetSize: packetSize || undefined,
              dontFrag: dontFrag || undefined,
              port: port || undefined,
              protocol: protocol || undefined,
              debug: debug
            })
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText || `Server responded with status: ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });
            output.textContent += chunk;
            output.scrollTop = output.scrollHeight;
          }

        } catch (error) {
          console.error('Fetch error:', error);
          output.textContent += `\n--- ERROR ---\n${error.message}`;
        } finally {
          runButton.disabled = false;
          runButton.textContent = 'Run';
        }
      });
    }
  </script>

</body>
</html>
